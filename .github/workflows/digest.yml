name: Generate digest

on:
  # Once daily: 07:00 Singapore time (UTC+8) → 23:00 UTC the previous day
  schedule:
    - cron: "0 23 * * *"
  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      no_llm:
        description: "Skip LLM step (use raw RSS descriptions)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.no_llm }}" = "true" ]; then
            python -m backend.pipeline --no-llm -v
          else
            python -m backend.pipeline -v
          fi

      - name: Commit & push generated HTML
        run: |
          git config user.name  "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add index.html ecommerce.html fintech.html ai.html state/seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: refresh digest $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
